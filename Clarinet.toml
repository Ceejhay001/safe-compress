[project]
name = "safe-compress"
authors = ["Safe Compress Team"]
description = "Decentralized platform for smart contract compression and licensing"
telemetry = false
requirements = []
[contracts.platform-governance]
path = "contracts/platform-governance.clar"
depends_on = []

[contracts.contract-marketplace]
path = "contracts/contract-marketplace.clar"
depends_on = []

[contracts.optimization-reputation]
path = "contracts/optimization-reputation.clar"
depends_on = []

[contracts.compression-license]
path = "contracts/compression-license.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
